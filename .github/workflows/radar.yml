# TwoSides Radar
#
# 意図どおりの実行頻度（スクリプト側の窓チェックと一致）:
#   - discover: JST 1日7回（PENDING 作成・深掘り）
#   - promote:  JST ピーク3回（7:30 / 12:00 / 19:30）に記事公開
#
# 以前は */15 で Workflow 自体を回し、スクリプトが no-op する方式だったため
# GitHub Actions 上では日中だけで約70回/日走って見えていた。
# 実作業が無い run（npm ci だけ）を減らすため、起動時刻を窓に合わせる。
#
# detect（RSS/LIVE・30分おき）と followup（続報・毎時）は radar-live.yml に分離。
name: TwoSides Radar

on:
  schedule:
    # —— discover 7/day（JST → UTC = JST−9）——
    - cron: "0 21 * * *" # 06:00 JST
    - cron: "0 1 * * *" # 10:00 JST
    - cron: "30 4 * * *" # 13:30 JST
    - cron: "0 7 * * *" # 16:00 JST
    - cron: "0 9 * * *" # 18:00 JST
    - cron: "0 12 * * *" # 21:00 JST
    - cron: "0 15 * * *" # 00:00 JST
    # —— promote 3/day ——
    - cron: "30 22 * * *" # 07:30 JST
    - cron: "0 3 * * *" # 12:00 JST
    - cron: "30 10 * * *" # 19:30 JST
  workflow_dispatch: {}

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Discover: buzz research (7 windows/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          RADAR_TOPIC_FILTER_MODEL: ${{ secrets.RADAR_TOPIC_FILTER_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/discover.ts

      - name: "Promote: publish buzz articles at peak times (3/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ARTICLE_API_KEY: ${{ secrets.ARTICLE_API_KEY }}
          ARTICLE_BASE_URL: ${{ secrets.ARTICLE_BASE_URL }}
          ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: npx tsx scripts/radar/promote.ts
