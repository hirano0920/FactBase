# TwoSides Radar
#
# 意図どおりの実行頻度（スクリプト側の窓チェックと一致。src/lib/constants.ts の
# discoverWindowsJst / peakWindowsJst と必ず対で変更すること）:
#   - discover: JST 1日7回（PENDING 作成・深掘り）
#   - promote:  JST ピーク3回（6:33 / 11:03 / 16:03）に記事公開
#
# 以前は */15 で Workflow 自体を回し、スクリプトが no-op する方式だったため
# GitHub Actions 上では日中だけで約70回/日走って見えていた。
# 実作業が無い run（npm ci だけ）を減らすため、起動時刻を窓に合わせる。
#
# cronの分は意図的に「ちょうど0分・30分」を避けている。GitHub Actionsの
# scheduled cronは毎時ちょうどに世界中のジョブが集中し混雑・数十分の遅延や
# トリガー自体の欠落が起きやすい（GitHub公式ドキュメントも明記）。
#
# 2026-07-12〜14にかけて、cronの遅延・欠落でdiscover/promoteが最大17時間超
# 完全に止まる障害が連続で起きた（詳細はconstants.tsのコメント）。許容幅を
# 広げるだけでは「本来の時刻ぴったりに出す」設計だと原理的に限界があるため、
# 方針を変更: 「読者が実際に見る時刻」ではなく、その1時間前をcron目標にする。
# cronは遅れることはあっても早く動くことは無く、早く公開されても実害が無い
# （むしろ読者が来る前には確実に用意されている）ため、+1時間の遅延まで
# 気にしなくてよい設計にした（2026-07-14、ユーザーとの合意）。
# 実際の読者到達目標: 朝7:30・昼12:00・夕方17:00 → cron目標: 6:33/11:03/16:03。
#
# detect（RSS/LIVE・30分おき）と followup（続報・毎時）は radar-live.yml に分離。
name: TwoSides Radar

on:
  schedule:
    # —— discover 7/day（JST → UTC = JST−9）——
    - cron: "3 20 * * *" # 05:03 JST → 6:33ピークの90分前
    - cron: "33 0 * * *" # 09:33 JST → 11:03ピークの90分前
    - cron: "33 3 * * *" # 12:33 JST 昼過ぎスイープ
    - cron: "33 5 * * *" # 14:33 JST → 16:03ピークの90分前
    - cron: "3 9 * * *" # 18:03 JST 夕方スイープ
    - cron: "3 12 * * *" # 21:03 JST 夜スイープ
    - cron: "33 15 * * *" # 00:33 JST 深夜スイープ（翌朝6:33ピークに備える）
    # —— promote 3/day（実際の読者到達目標の1時間前） ——
    - cron: "33 21 * * *" # 06:33 JST
    - cron: "3 2 * * *" # 11:03 JST
    - cron: "3 7 * * *" # 16:03 JST
  workflow_dispatch: {}

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Discover: buzz research (7 windows/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          RADAR_TOPIC_FILTER_MODEL: ${{ secrets.RADAR_TOPIC_FILTER_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/discover.ts

      - name: "Promote: publish buzz articles at peak times (3/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ARTICLE_API_KEY: ${{ secrets.ARTICLE_API_KEY }}
          ARTICLE_BASE_URL: ${{ secrets.ARTICLE_BASE_URL }}
          ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: npx tsx scripts/radar/promote.ts
