# FactBase Radar — 検知〜速報公開〜GPT-5まとめの定期実行。
# publicリポジトリならGitHub Actionsは無料（無制限分数）。
# 日中(JST 06:00-24:00)は15分間隔、深夜(JST 00:00-06:00)は誰も見ていない前提で
# 30分間隔に間引いている（cronはUTC基準: JST 00:00-06:00 = UTC 15:00-20:59）。
name: FactBase Radar

on:
  schedule:
    - cron: "*/15 21-23,0-14 * * *" # JST 06:00-24:00（日中・活発時間帯）
    - cron: "*/30 15-20 * * *" # JST 00:00-06:00（深夜・間引き）
  workflow_dispatch: {}

concurrency:
  group: radar
  cancel-in-progress: false # 実行中はスキップでなく待機（二重公開防止）

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Discover: buzz-driven topic research (Diet/law/news)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          RADAR_TOPIC_FILTER_MODEL: ${{ secrets.RADAR_TOPIC_FILTER_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/discover.ts

      - name: Detect & publish breaking issues
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          RADAR_CLASSIFY_MODEL: ${{ secrets.RADAR_CLASSIFY_MODEL }}
          RADAR_AUTO_PUBLISH_PER_DAY: "8"
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/detect.ts

      - name: Generate Level-2 summaries (GPT-5)
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          ARTICLE_DAILY_ARTICLE_LIMIT: "10"
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/summarize.ts

      - name: "Follow-up: link new events & refresh live articles"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          FOLLOWUP_DAILY_LIMIT: "15"
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/followup.ts

      - name: "Promote: publish buzz-driven articles at peak times"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
        run: npx tsx scripts/radar/promote.ts
