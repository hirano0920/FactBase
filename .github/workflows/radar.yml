# TwoSides Radar — detect（RSS/🔴LIVE速報・30分おき）→ discover（バズ能動調査）→ promote（ピーク公開）
#   → followup（続報反映・1時間おき）。summarize はコスト削減のため引き続き cron から外している。
# スクリプト自体は残してあり、必要なら手動実行可能。
# 日中(JST 06:00-24:00)は15分間隔、深夜(JST 00:00-06:00)は30分間隔
# （cronはUTC基準: JST 00:00-06:00 = UTC 15:00-20:59）。
# detect は JST 30分おきの窓（🔴LIVE速報公開・RSS carry-over候補生成・sustained更新）、
# discover は JST 1日7回の窓、promote はピーク3回（7:30/12:00/19:30）、
# followup は JST 1時間おきの窓（Writer呼び出しを伴い高コストなためdetectより間隔を空ける）。
name: TwoSides Radar

on:
  schedule:
    - cron: "*/15 21-23,0-14 * * *" # JST 06:00-24:00（日中・活発時間帯）
    - cron: "*/30 15-20 * * *" # JST 00:00-06:00（深夜・間引き）
  workflow_dispatch: {}

concurrency:
  group: radar
  cancel-in-progress: false # 実行中はスキップでなく待機（二重公開防止）

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Detect: RSS/breaking-news scan + carry-over candidates (every 30min JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ARTICLE_API_KEY: ${{ secrets.ARTICLE_API_KEY }}
          ARTICLE_BASE_URL: ${{ secrets.ARTICLE_BASE_URL }}
          ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: npx tsx scripts/radar/detect.ts

      - name: "Discover: buzz research (7 windows/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          RADAR_TOPIC_FILTER_MODEL: ${{ secrets.RADAR_TOPIC_FILTER_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: npx tsx scripts/radar/discover.ts

      - name: "Promote: publish buzz articles at peak times (3/day JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ARTICLE_API_KEY: ${{ secrets.ARTICLE_API_KEY }}
          ARTICLE_BASE_URL: ${{ secrets.ARTICLE_BASE_URL }}
          ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          RADAR_INTERNAL_SECRET: ${{ secrets.RADAR_INTERNAL_SECRET }}
          AUTH_URL: ${{ secrets.AUTH_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: npx tsx scripts/radar/promote.ts

      - name: "Followup: regenerate articles with new evidence (hourly JST)"
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          ARTICLE_API_KEY: ${{ secrets.ARTICLE_API_KEY }}
          ARTICLE_BASE_URL: ${{ secrets.ARTICLE_BASE_URL }}
          ARTICLE_MODEL: ${{ secrets.ARTICLE_MODEL }}
          RADAR_ALERT_WEBHOOK_URL: ${{ secrets.RADAR_ALERT_WEBHOOK_URL }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
        run: npx tsx scripts/radar/followup.ts
