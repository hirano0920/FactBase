# ABEMA Prime連携の実地検証（一時ワークフロー）。手動起動のみ、cronなし、DB書き込みなし。
# 目的: Gemini APIのYouTube URL動画理解機能でのdebate/news/exclude分類+抽出がCI環境でも通るか確認する。
# yt-dlp/Cookie認証は不要になった（Google公式APIでYouTube URLを直接渡すため、
# 今まで悩まされたBot対策・IPレピュテーション・n challenge・Cookie失効の問題が原理的に発生しない）。
name: Test ABEMA Prime integration

on:
  workflow_dispatch: {}

jobs:
  test-abema:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate

      - name: "Test: ABEMA Prime discovery + Gemini classification/extraction"
        env:
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npx tsx scripts/radar/_test_abema.ts
