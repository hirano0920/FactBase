# ABEMA Prime連携の実地検証（一時ワークフロー）。手動起動のみ、cronなし、DB書き込みなし。
# 目的: yt-dlp(player_client=android) + Cookie認証でのYouTube字幕取得がCI環境でも通るか確認する。
# Cookie無しではGitHub ActionsのIP（データセンター）だとBot対策で弾かれることを確認済み（2026-07-19）。
# YTDLP_COOKIES_B64 secretは、専用の捨てGoogleアカウントでログインした状態からエクスポートした
# cookies.txt（Netscape形式）をbase64化したもの。本アカウントのCookieは絶対に使わないこと。
name: Test ABEMA Prime integration

on:
  workflow_dispatch: {}

jobs:
  test-abema:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "yt-dlp[default]"

      - run: npm ci
      - run: npx prisma generate

      - name: "Test: ABEMA Prime discovery + classification + transcript fetch"
        env:
          YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_DATA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          YTDLP_COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
        run: npx tsx scripts/radar/_test_abema.ts
